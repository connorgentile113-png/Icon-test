<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Safari Icon Test</title>

  <!-- Standard favicon (won’t be used for iOS home screen, but included anyway) -->
  <link rel="icon" href="favicon.png" type="image/png">

  <!-- Apple Touch Icon (THIS is what Safari uses) -->
  <link rel="apple-touch-icon" href="icon.png">

  <!-- Optional: force a specific size -->
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">

  <!-- Makes it behave more like an app -->
  <meta name="apple-mobile-web-app-capable" content="yes">

  <!-- Optional styling -->
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <h1>Safari Icon Test</h1>
  <p>Add this page to your home screen and check the icon.</p>
</body>
</html>
